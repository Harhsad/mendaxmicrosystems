<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Mendax MicroSystems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/custom.css">

    <script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous">
        </script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
            $("#cta-default").load("cta-default.html");
        });
    </script>
</head>

<body class="login">


    <div class="wrapper">

        <div class="container">
            <div class="page-info" >
                <div class="row align-items-center">
                    <div class="col-12 col-xl-6">

                    <div class="login-info">

                        <div class="logo"><img src="images/logo-black.png" alt=""> </div>
                        <div class="login-box">
                            <div class="title mb-3 mt-1">
                            <h2>Sign in to your <b>Mendax Account</b></h2>
                            </div>
                            <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Email">
                              </div>
                              <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">Password</label>
                                <input type="password" class="form-control pswd-icon" id="exampleFormControlInput1" placeholder="....">
                              </div>
                            <div class="mb-3 d-flex justify-content-between">
                              <div class="form-check col-sm-6">
                                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                                <label class="form-check-label" for="exampleCheck1">Remember me</label>
                              </div>
                              <div class="col-sm-6"><a href="forgot-pswd.html" class="forget-pswd">Forgot password?</a> </div>
                            </div>

                              <button type="submit" class="btn btn-primary">Login</button>
                              <p>Don't have an account? <a href="sign-up.html">Sign up</a></p>


                        </div>

                    </div>




                       </div>

                       <div class="col-12 col-xl-6">
                        <div class="img-screen"><img src="images/login-img.jpg" alt=""></div>                       
                       </div>


                    </div>
                </div>
            </div>
        </div>

    </div>






    </div>




  
  
</body>

</html>
