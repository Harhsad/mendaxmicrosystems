<html lang="en">

<head>

        });
    </script>

<body class="login secure-checkout">
    <div id="header"></div>

    <div class="wrapper">
        <div class="container">
            <div class="page-info" >
                <div class="row justify-content-left">
                <a href="shopping-cart.html" class="btn-link back-buttton">Back to cart</a>
                </div>



                <div class="row justify-content-left  mt-5 mb-4">
                    <div class="col-12 col-sm-10">
                      <h1>Secure Checkout</h1>
                        </div> 
                        </div>



                <div class="row align-items-left">

                    <div class="col-12 col-sm-5 col-xl-3">

                        <div class="login-info guest-checkout">
                            <div class="login-box">
                                <div class="title mb-3 mt-4">
                                <h2>Guest <b>checkout.</b></h2>
                                <p>No account? No problem. Create an account later to keep track of your orders.</p>
                                <a href="checkout-review.html" class="btn-link">Continue</a>
                                </div>
                                </div>
    
                        </div>
                           </div>


                    <div class="col-12 col-sm-7 col-xl-5">

                    <div class="login-info">
                        <div class="login-box">
                            <div class="title mb-3">
                            <h2>Sign in to your <b>Mendax Account</b></h2>
                            </div>
                            <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Email">
                              </div>
                              <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">Password</label>
                                <input type="password" class="form-control pswd-icon" id="exampleFormControlInput1" placeholder="....">
                              </div>
                            <div class="mb-3 d-flex justify-content-between align-items-center">
                              <div class="col-sm-6"><button type="submit" class="btn btn-primary">Sign In</button></div>
                              <div class="col-sm-6"><a href="forgot-pswd.html" class="forget-pswd">Forgot password?</a> </div>
                            </div>

                              
                             


                        </div>

                    </div>
                       </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
