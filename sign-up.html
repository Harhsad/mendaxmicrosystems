<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign up - Mendax MicroSystems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/custom.css">

    <script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous">
        </script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
            $("#cta-default").load("cta-default.html");
        });
    </script>
</head>

<body class="login">


    <div class="wrapper">

        <div class="container">
            <div class="page-info" >
                <div class="row align-items-center">
                    <div class="col-12 col-xl-6">

                    <div class="login-info">

                        <div class="logo"><img src="images/logo-black.png" alt=""> </div>
                        <div class="login-box">
                            <div class="title mb-3 mt-1">
                            <h2>Create your <b>Mendax Account</b></h2>
                        </div>
                            <div class="mb-3">
                                <input type="name" class="form-control" id="exampleFormControlInput1" placeholder="First Name">
                              </div>
                              <div class="mb-3">
                                <input type="name" class="form-control" id="exampleFormControlInput1" placeholder="Last Name">
                              </div>
                              <div class="mb-3">
                                <input type="Email" class="form-control" id="exampleFormControlInput1" placeholder="Email">
                              </div>
                              <div class="mb-3">
                                <input type="Password" class="form-control" id="exampleFormControlInput1" placeholder="Password">
                              </div>
                              <div class="mb-3">
                                <input type="Password" class="form-control" id="exampleFormControlInput1" placeholder="Confirm Password">
                              </div>
                              <div class="mb-3">
                                <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="Phone">
                              </div>
                              <div class="mb-3">
                                <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="Company">
                              </div>
                              <button type="submit" class="btn btn-primary">SUBMIT</button>


                        </div>

                    </div>




                       </div>

                       <div class="col-12 col-xl-6">
                        <div class="img-screen"><img src="images/login-img.jpg" alt=""></div>                       
                       </div>


                    </div>
                </div>
            </div>
        </div>

    </div>






    </div>




  
  
</body>

</html>
